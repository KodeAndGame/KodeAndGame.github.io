name: Fetch Daily Puzzle

on:
  schedule:
    - cron: '5 6 * * *'   # 6:05 UTC daily (~2am ET, after NYT midnight publish)
  workflow_dispatch:       # allow manual runs from Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch today's puzzle
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p puzzles
          if curl -sf --max-time 15 \
            "https://www.nytimes.com/svc/connections/v2/${DATE}.json" \
            -o "puzzles/${DATE}.json"; then
            echo "Fetched puzzle for ${DATE}"
          else
            echo "Puzzle not available yet for ${DATE}, skipping"
            exit 0
          fi

      - name: Commit if new
        run: |
          DATE=$(date -u +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add puzzles/
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "puzzle: ${DATE}" && git push
