<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Kode+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #EAE5DB;
      --dot-color:   #C9C2B5;
      --surface:     rgba(255,255,255,0.5);
      --surface-solid: #F5F2EC;
      --ink:         #111010;
      --ink-mid:     #555050;
      --ink-faint:   #9A9490;
      --accent:      #111010;
      --border:      rgba(0,0,0,0.09);
      --radius:      8px;
      --header-h:    56px;
      --content-w:   680px;
    }

    html {
      background: var(--bg);
      min-height: 100%;
    }

    body {
      font-family: 'Kode Mono', monospace;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle, var(--dot-color) 1.2px, transparent 1.2px)
        0 0 / 26px 26px;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────── */
    #site-header {
      position: sticky;
      top: 0;
      z-index: 200;
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(234,229,219,0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #site-title {
      font-family: 'Kode Mono', monospace;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      white-space: nowrap;
    }
    #site-title:hover { color: var(--ink-mid); }

    #site-nav {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .nav-link {
      font-family: 'Kode Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-mid);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 5px;
      border: 1.5px solid transparent;
      transition: border-color 0.12s, color 0.12s;
    }
    .nav-link:hover,
    .nav-link.active { border-color: var(--border); color: var(--ink); }

    /* ── Page content ─────────────────────────── */
    #page-content {
      flex: 1;
      width: 100%;
      max-width: var(--content-w);
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Typography ───────────────────────────── */
    h1, h2, h3, h4 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800;
      line-height: 1.15;
      color: var(--ink);
    }

    h1 { font-size: 2rem;   margin-bottom: 0.6em; }
    h2 { font-size: 1.3rem; margin-top: 2em; margin-bottom: 0.5em; }
    h3 { font-size: 1.05rem; margin-top: 1.6em; margin-bottom: 0.4em; }

    p {
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--ink-mid);
      margin-bottom: 1.1em;
    }

    a {
      color: var(--ink);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: var(--dot-color);
      transition: text-decoration-color 0.12s;
    }
    a:hover { text-decoration-color: var(--ink); }

    ul, ol {
      padding-left: 1.4em;
      margin-bottom: 1.1em;
    }
    li {
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--ink-mid);
      margin-bottom: 0.25em;
    }
    li a { color: var(--ink); }

    code {
      font-family: 'Kode Mono', monospace;
      font-size: 0.88em;
      background: rgba(0,0,0,0.06);
      padding: 1px 5px;
      border-radius: 3px;
    }

    pre {
      background: rgba(0,0,0,0.06);
      border-radius: var(--radius);
      padding: 16px 18px;
      overflow-x: auto;
      margin-bottom: 1.2em;
    }
    pre code { background: none; padding: 0; font-size: 12px; }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    blockquote {
      border-left: 3px solid var(--dot-color);
      padding-left: 16px;
      color: var(--ink-mid);
      font-style: italic;
      margin-bottom: 1.1em;
    }

    /* ── Footer ───────────────────────────────── */
    #site-footer {
      text-align: center;
      padding: 20px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header id="site-header">
  <a href="/" id="site-title">{{ site.title }}</a>
  <nav id="site-nav">
    <a href="/" class="nav-link{% if page.url == '/' %} active{% endif %}">Home</a>
    {% if site.show_excerpts %}<a href="/posts/" class="nav-link{% if page.url contains '/posts' %} active{% endif %}">Posts</a>{% endif %}
  </nav>
</header>

<main id="page-content">
  {{ content }}
</main>

<footer id="site-footer">
  {{ site.title }} &mdash; {{ site.description }}
</footer>

</body>
</html>
