---
layout: none
title: Connections Board
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connections Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Kode+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #EAE5DB;
      --dot-color: #C9C2B5;
      --tile-bg: #FFFFFF;
      --tile-border: rgba(0,0,0,0.07);
      --tile-shadow: 2px 4px 14px rgba(0,0,0,0.11);
      --tile-shadow-hover: 4px 8px 24px rgba(0,0,0,0.18);
      --tile-shadow-drag: 8px 16px 40px rgba(0,0,0,0.26);
      --ink: #111010;
      --ink-mid: #555050;
      --ink-faint: #9A9490;
      --accent: #111010;
      --tile-radius: 10px;
      --tile-size: 130px;
      --gap: 14px;
      --header-h: 58px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      font-family: 'Kode Mono', monospace;
      color: var(--ink);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────── */
    #header {
      flex-shrink: 0;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 20px;
      border-bottom: 1px solid rgba(0,0,0,0.09);
      background: rgba(255,255,255,0.38);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: relative;
      z-index: 200;
    }

    .nav-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1.5px solid var(--ink);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      font-size: 13px;
      line-height: 1;
      transition: background 0.12s, color 0.12s;
      flex-shrink: 0;
    }
    .nav-btn:hover:not(:disabled) { background: var(--ink); color: #fff; }
    .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    #date-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    #date-label {
      font-family: 'Kode Mono', monospace;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.1em;
      padding: 7px 16px;
      border-radius: 7px;
      border: 1.5px solid transparent;
      transition: border-color 0.12s;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    #date-label:hover { border-color: rgba(0,0,0,0.18); }

    #date-input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    #puzzle-id {
      font-size: 11px;
      color: var(--ink-faint);
      letter-spacing: 0.06em;
    }

    .header-right {
      position: absolute;
      right: 18px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .header-btn {
      font-family: 'Kode Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 6px 12px;
      border-radius: 5px;
      border: 1.5px solid var(--ink-mid);
      background: transparent;
      color: var(--ink-mid);
      cursor: pointer;
      transition: all 0.12s;
    }
    .header-btn:hover { border-color: var(--ink); color: var(--ink); }

    /* ── Board ───────────────────────────────── */
    #board {
      flex: 1;
      position: relative;
      overflow: hidden;
      background-image: radial-gradient(circle, var(--dot-color) 1.2px, transparent 1.2px);
      background-size: 26px 26px;
    }

    /* ── Status overlay ─────────────────────── */
    #status-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      pointer-events: none;
      z-index: 50;
    }

    #status-overlay.hidden { display: none; }

    .spinner {
      width: 30px;
      height: 30px;
      border: 2.5px solid rgba(0,0,0,0.1);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--ink-mid);
      text-align: center;
      line-height: 1.6;
    }
    .status-text.error { color: #B03030; }

    #test-btn {
      font-family: 'Kode Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.09em;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1.5px solid #B03030;
      background: transparent;
      color: #B03030;
      cursor: pointer;
      transition: all 0.12s;
      display: none;
    }
    #test-btn:hover { background: #B03030; color: #fff; }
    #test-btn.visible { display: block; }

    /* ── Tiles ───────────────────────────────── */
    .tile {
      position: absolute;
      width: var(--tile-size);
      height: var(--tile-size);
      background: var(--tile-bg);
      border-radius: var(--tile-radius);
      box-shadow: var(--tile-shadow);
      border: 1px solid var(--tile-border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      transition: box-shadow 0.14s, transform 0.14s;
      will-change: transform, left, top;
      animation: tile-in 0.22s ease both;
    }

    @keyframes tile-in {
      from { opacity: 0; transform: translateY(6px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .tile:hover {
      box-shadow: var(--tile-shadow-hover);
      transform: translateY(-2px);
    }

    .tile.dragging {
      box-shadow: var(--tile-shadow-drag);
      transform: rotate(1.5deg) scale(1.04) translateY(-2px);
      cursor: grabbing;
      transition: none;
    }

    .tile-text {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
      color: var(--ink);
      word-break: break-word;
      hyphens: none;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="header">
  <button class="nav-btn" id="prev-btn" title="Previous day" aria-label="Previous day">&#8592;</button>

  <div id="date-wrapper">
    <span id="date-label">—</span>
    <input type="date" id="date-input" aria-label="Select date">
  </div>

  <span id="puzzle-id"></span>
  <button class="nav-btn" id="next-btn" title="Next day" aria-label="Next day">&#8594;</button>

  <div class="header-right">
    <button class="header-btn" id="reset-btn">RESET</button>
  </div>
</div>

<div id="board">
  <div id="status-overlay">
    <div class="spinner"></div>
    <div class="status-text" id="status-text">LOADING</div>
    <button id="test-btn">USE SAMPLE TILES</button>
  </div>
</div>

<script>
  // ── Constants ──────────────────────────────────────────────
  const EARLIEST     = '2023-06-12'; // Connections launch date
  const TILE_SIZE    = 130;
  const GAP          = 14;
  const COLS         = 4;
  const CYCLE_COLORS = [null, '#F9DF6D', '#A0C35A', '#B0C4EF', '#BA81C5'];

  // ── DOM refs ───────────────────────────────────────────────
  const board         = document.getElementById('board');
  const statusOverlay = document.getElementById('status-overlay');
  const statusText    = document.getElementById('status-text');
  const dateLabel     = document.getElementById('date-label');
  const dateInput     = document.getElementById('date-input');
  const puzzleId      = document.getElementById('puzzle-id');
  const prevBtn       = document.getElementById('prev-btn');
  const nextBtn       = document.getElementById('next-btn');
  const resetBtn      = document.getElementById('reset-btn');
  const testBtn       = document.getElementById('test-btn');

  // ── State ──────────────────────────────────────────────────
  let currentDate = todayStr();
  let activeTiles = [];   // DOM elements currently on board
  let maxZ        = 10;

  // ── Date helpers ───────────────────────────────────────────
  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function displayDate(str) {
    const months = ['JAN','FEB','MAR','APR','MAY','JUN',
                    'JUL','AUG','SEP','OCT','NOV','DEC'];
    const [y, m, d] = str.split('-');
    return `${months[+m - 1]} ${+d}, ${y}`;
  }

  function addDays(str, n) {
    const d = new Date(str + 'T12:00:00Z');
    d.setUTCDate(d.getUTCDate() + n);
    return d.toISOString().slice(0, 10);
  }

  function clamp(str) {
    const today = todayStr();
    if (str < EARLIEST) return EARLIEST;
    if (str > today)    return today;
    return str;
  }

  // ── Storage helpers ────────────────────────────────────────
  function storageKey(date) { return `cx-pos-${date}`; }

  function savePositions() {
    const pos = {};
    activeTiles.forEach(t => {
      pos[t.dataset.word] = {
        x: parseFloat(t.style.left),
        y: parseFloat(t.style.top),
        colorIdx: parseInt(t.dataset.colorIdx) || 0
      };
    });
    try { localStorage.setItem(storageKey(currentDate), JSON.stringify(pos)); } catch {}
  }

  function loadPositions() {
    try { return JSON.parse(localStorage.getItem(storageKey(currentDate))) || null; } catch { return null; }
  }

  // ── Default grid layout ────────────────────────────────────
  function defaultPositions(words) {
    const bw = board.clientWidth;
    const bh = board.clientHeight;
    const rows  = Math.ceil(words.length / COLS);
    const gridW = COLS * TILE_SIZE + (COLS - 1) * GAP;
    const gridH = rows  * TILE_SIZE + (rows  - 1) * GAP;
    const startX = Math.max(20, (bw - gridW) / 2);
    const startY = Math.max(20, (bh - gridH) / 2);

    const pos = {};
    words.forEach((w, i) => {
      pos[w] = {
        x: Math.round(startX + (i % COLS) * (TILE_SIZE + GAP)),
        y: Math.round(startY + Math.floor(i / COLS) * (TILE_SIZE + GAP))
      };
    });
    return pos;
  }

  // ── Font sizing ────────────────────────────────────────────
  function fontSize(text) {
    // base size on the longest space-separated token
    const maxLen = Math.max(...text.split(' ').map(w => w.length));
    if (maxLen <= 3)  return '19px';
    if (maxLen <= 5)  return '17px';
    if (maxLen <= 7)  return '15px';
    if (maxLen <= 10) return '13px';
    return '11px';
  }

  // ── Seeded shuffle (deterministic per date) ────────────────
  function seededShuffle(arr, seed) {
    let s = seed >>> 0;
    const rng = () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 0x100000000; };
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function dateSeed(str) {
    return parseInt(str.replace(/-/g, ''), 10);
  }

  // ── Fetch puzzle ────────────────────────────────────────────
  async function fetchPuzzle(date) {
    const nytUrl = `https://www.nytimes.com/svc/connections/v2/${date}.json`;

    // Try direct (works if NYT has CORS headers for this endpoint)
    try {
      const r = await fetch(nytUrl);
      if (r.ok) return r.json();
    } catch { /* CORS blocked — fall through to proxy */ }

    // Fallback: public CORS proxy
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(nytUrl)}`;
    const r2 = await fetch(proxyUrl);
    if (!r2.ok) throw new Error(`No puzzle data for ${date}`);
    return r2.json();
  }

  // ── Parse words from API response ──────────────────────────
  function extractWords(data) {
    const words = [];
    if (Array.isArray(data.categories)) {
      data.categories.forEach(cat => {
        if (Array.isArray(cat.cards)) {
          cat.cards.forEach(card => {
            if (card.content) words.push(card.content.trim().toUpperCase());
          });
        }
      });
    }
    return words;
  }

  // ── Tile color cycling ─────────────────────────────────────
  function setTileColor(tile, idx) {
    tile.dataset.colorIdx = idx;
    tile.style.background = CYCLE_COLORS[idx] || '';
  }

  function cycleTileColor(tile) {
    const next = ((parseInt(tile.dataset.colorIdx) || 0) + 1) % CYCLE_COLORS.length;
    setTileColor(tile, next);
    savePositions();
  }

  // ── Tile drag ──────────────────────────────────────────────
  function setupDrag(tile) {
    let active = false, ox = 0, oy = 0, tx = 0, ty = 0, moved = false;

    function start(cx, cy) {
      active = true;
      moved  = false;
      ox = cx; oy = cy;
      tx = parseFloat(tile.style.left) || 0;
      ty = parseFloat(tile.style.top)  || 0;
      tile.classList.add('dragging');
      tile.style.zIndex = ++maxZ;
    }

    function move(cx, cy) {
      if (!active) return;
      if (!moved && Math.hypot(cx - ox, cy - oy) > 5) moved = true;
      tile.style.left = (tx + cx - ox) + 'px';
      tile.style.top  = (ty + cy - oy) + 'px';
    }

    function end() {
      if (!active) return;
      active = false;
      tile.classList.remove('dragging');
      if (!moved) {
        cycleTileColor(tile);
      } else {
        savePositions();
      }
    }

    // Mouse
    tile.addEventListener('mousedown', e => {
      e.preventDefault();
      start(e.clientX, e.clientY);
      const mm = e2 => move(e2.clientX, e2.clientY);
      const mu = () => { end(); document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
      document.addEventListener('mousemove', mm);
      document.addEventListener('mouseup', mu);
    });

    // Touch
    tile.addEventListener('touchstart', e => {
      e.preventDefault();
      start(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    tile.addEventListener('touchmove', e => {
      e.preventDefault();
      move(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    tile.addEventListener('touchend', end);
    tile.addEventListener('touchcancel', end);
  }

  // ── Render tiles ────────────────────────────────────────────
  function renderTiles(words, positions) {
    activeTiles.forEach(t => t.remove());
    activeTiles = [];

    words.forEach((word, i) => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.word = word;
      tile.style.animationDelay = `${i * 28}ms`;

      const text = document.createElement('div');
      text.className = 'tile-text';
      text.textContent = word;
      text.style.fontSize = fontSize(word);

      tile.appendChild(text);

      const pos = positions[word] || { x: 50, y: 50 };
      tile.style.left   = pos.x + 'px';
      tile.style.top    = pos.y + 'px';
      tile.style.zIndex = maxZ + i;
      setTileColor(tile, pos.colorIdx || 0);

      setupDrag(tile);
      board.appendChild(tile);
      activeTiles.push(tile);
    });

    maxZ += words.length;
  }

  // ── Sample data (offline / CORS fallback test) ─────────────
  const SAMPLE_WORDS = [
    'BELT LOOP','CUFF','FLY','POCKET',
    'ANGLE','CAST','TROLL','FLY ROD',
    'PROJECT','TAKE','POINT OF VIEW','LENS',
    'RUSSIAN','BARBIE','MATRYOSHKA','NESTING'
  ];

  // ── Status helpers ─────────────────────────────────────────
  function showStatus(msg, isError = false) {
    statusOverlay.classList.remove('hidden');
    statusText.className = 'status-text' + (isError ? ' error' : '');
    statusText.innerHTML = msg;
    statusOverlay.querySelector('.spinner').style.display = isError ? 'none' : 'block';
    testBtn.classList.toggle('visible', isError);
  }

  function hideStatus() {
    statusOverlay.classList.add('hidden');
    testBtn.classList.remove('visible');
  }

  // ── Load a date ─────────────────────────────────────────────
  async function loadDate(date) {
    currentDate = clamp(date);

    dateLabel.textContent = displayDate(currentDate);
    dateInput.value = currentDate;
    dateInput.max   = todayStr();
    dateInput.min   = EARLIEST;
    puzzleId.textContent = '';
    prevBtn.disabled = currentDate <= EARLIEST;
    nextBtn.disabled = currentDate >= todayStr();

    showStatus('LOADING');

    try {
      const data  = await fetchPuzzle(currentDate);
      const raw   = extractWords(data);

      if (!raw.length) throw new Error('Puzzle data empty or unrecognized format');

      // Show puzzle #
      if (data.id) puzzleId.textContent = `#${data.id}`;

      // Shuffle deterministically by date (so first-load order is consistent)
      const words = seededShuffle(raw, dateSeed(currentDate));

      // Restore saved positions if they cover all words, else default grid
      const saved = loadPositions();
      const positions = (saved && words.every(w => w in saved))
        ? saved
        : defaultPositions(words);

      renderTiles(words, positions);

      // Persist default layout on first visit so reloads look the same
      if (!saved || !words.every(w => w in saved)) savePositions();

      hideStatus();
    } catch (err) {
      showStatus(`COULDN'T LOAD PUZZLE<br><span style="font-size:10px;font-weight:400">${err.message}</span>`, true);
    }
  }

  // ── Event listeners ────────────────────────────────────────
  prevBtn.addEventListener('click', () => loadDate(addDays(currentDate, -1)));
  nextBtn.addEventListener('click', () => loadDate(addDays(currentDate, 1)));

  dateInput.addEventListener('change', () => {
    if (dateInput.value) loadDate(dateInput.value);
  });

  resetBtn.addEventListener('click', () => {
    localStorage.removeItem(storageKey(currentDate));
    const words = activeTiles.map(t => t.dataset.word);
    const positions = defaultPositions(words);
    renderTiles(words, positions);
    savePositions();
  });

  testBtn.addEventListener('click', () => {
    const words     = seededShuffle(SAMPLE_WORDS, dateSeed(currentDate));
    const positions = defaultPositions(words);
    renderTiles(words, positions);
    hideStatus();
  });

  // ── Boot ───────────────────────────────────────────────────
  loadDate(currentDate);
</script>
</body>
</html>
