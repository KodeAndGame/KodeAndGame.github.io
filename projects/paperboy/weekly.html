<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paperboy — Weekly Digest</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e8f0;
    --muted: #64748b;
    --high: #4ade80;
    --notable: #60a5fa;
    --low: #fbbf24;
    --noise: #6b7280;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
  header span { color: var(--muted); font-size: 13px; }

  .header-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .nav-link {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    text-decoration: none;
    transition: border-color 0.15s;
    display: inline-block;
  }

  .nav-link:hover { border-color: var(--notable); }

  #loading {
    display: none;
    padding: 48px 32px;
    text-align: center;
    color: var(--muted);
  }

  #error-msg {
    display: none;
    margin: 48px auto;
    max-width: 480px;
    padding: 16px 20px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    color: #f87171;
    text-align: center;
  }

  #report { display: none; padding: 24px 32px; max-width: 1200px; }

  .digest-title {
    margin-bottom: 24px;
    color: var(--muted);
    font-size: 14px;
    font-weight: normal;
  }

  .summary-bar {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 32px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-value { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

  .stat-value.high { color: var(--high); }
  .stat-value.notable { color: var(--notable); }

  section { margin-bottom: 36px; }
  section h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 14px; }

  .dist-bars { display: flex; flex-direction: column; gap: 8px; }

  .dist-row {
    display: grid;
    grid-template-columns: 90px 1fr 48px;
    align-items: center;
    gap: 12px;
  }

  .dist-label { font-size: 12px; color: var(--muted); text-align: right; }

  .dist-bar-bg {
    height: 20px;
    background: var(--surface);
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .dist-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .dist-count { font-size: 12px; color: var(--muted); }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .sig-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    min-width: 36px;
    text-align: center;
  }

  .sig-high   { background: rgba(74,222,128,0.15); color: var(--high); }
  .sig-notable { background: rgba(96,165,250,0.15); color: var(--notable); }
  .sig-low    { background: rgba(251,191,36,0.15); color: var(--low); }
  .sig-noise  { background: rgba(107,114,128,0.15); color: var(--noise); }

  .title-link { color: var(--text); text-decoration: none; }
  .title-link:hover { color: var(--notable); }

  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .tag {
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .summary-text { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .feed-name { color: var(--muted); font-size: 12px; }

  @media (max-width: 768px) {
    table thead {
      display: none;
    }

    table, tbody {
      display: block;
    }

    tr {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 12px;
    }

    td {
      padding: 0;
      border-bottom: none;
    }

    /* Title gets full width at top */
    td:nth-child(2) {
      grid-column: 1 / -1;
      grid-row: 1;
    }

    /* Metadata below in 4-column layout */
    td:nth-child(1) { grid-column: 1; grid-row: 2; }
    td:nth-child(3) { grid-column: 2; grid-row: 2; }
    td:nth-child(4) { grid-column: 3; grid-row: 2; }
    td:nth-child(5) { grid-column: 4; grid-row: 2; }

    tr:hover td {
      background: none;
    }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Paperboy</h1>
  </div>
  <div class="header-nav">
    <a href="digest.html" class="nav-link">← Daily View</a>
  </div>
</header>

<div id="loading"><p>Loading digests...</p></div>
<div id="error-msg"></div>
<div id="report"></div>

<script>
const loading = document.getElementById('loading');
const report = document.getElementById('report');
const errorMsg = document.getElementById('error-msg');

const CACHE_PREFIX = 'paperboy-digest-';
const WEEK_MS = 7 * 24 * 60 * 60 * 1000;

function showError(msg) {
  loading.style.display = 'none';
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
  report.style.display = 'none';
}

function esc(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function safeUrl(u) {
  try { const p = new URL(u); return (p.protocol === 'https:' || p.protocol === 'http:') ? u : '#'; }
  catch { return '#'; }
}

function sigClass(s) {
  if (s >= 75) return 'high';
  if (s >= 50) return 'notable';
  if (s >= 25) return 'low';
  return 'noise';
}

async function loadManifest() {
  try {
    const res = await fetch('digests.json');
    return await res.json();
  } catch (err) {
    showError('Could not load digest manifest: ' + err.message);
    return null;
  }
}

function getWindowFilenames(filenames) {
  const dates = filenames.map(f => new Date(f.slice(0, 10)));
  const latest = new Date(Math.max(...dates.map(d => d.getTime())));
  const cutoff = new Date(latest.getTime() - WEEK_MS);
  return filenames.filter(f => new Date(f.slice(0, 10)).getTime() > cutoff.getTime());
}

async function fetchDigest(filename) {
  const cacheKey = `${CACHE_PREFIX}${filename}`;

  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      const { data, latestPublished } = JSON.parse(cached);
      const isStale = Date.now() > new Date(latestPublished).getTime() + WEEK_MS;
      if (!isStale) {
        return { data, fromCache: true };
      }
    }
  } catch (e) {
    // Cache read/parse error, fall through to fetch
  }

  try {
    const res = await fetch(`digests/${filename}`);
    const raw = await res.json();

    // Compute latestPublished from all items
    const dates = raw.map(i => {
      try { return new Date(i.published); }
      catch { return null; }
    }).filter(d => d && !isNaN(d));

    const latestPublished = dates.length > 0
      ? new Date(Math.max(...dates.map(d => d.getTime()))).toISOString()
      : new Date().toISOString();

    // Try to cache (best-effort)
    try {
      localStorage.setItem(cacheKey, JSON.stringify({ data: raw, latestPublished }));
    } catch (e) {
      // Storage full or quota exceeded, ignore
    }

    return { data: raw, fromCache: false };
  } catch (err) {
    return { data: [], fromCache: false };
  }
}

function aggregateItems(fileResults) {
  const deduped = new Map();

  for (const { filename, data } of fileResults) {
    const sourceDigest = filename.slice(0, 10) + ' ' + filename.slice(11, 13) + ':' + filename.slice(13, 15);

    for (const item of data) {
      if (!item.significance || item.significance <= 0) continue;

      const url = item.url;
      const existing = deduped.get(url);
      if (!existing || item.significance > existing.significance) {
        deduped.set(url, { ...item, _sourceDigest: sourceDigest });
      }
    }
  }

  return Array.from(deduped.values());
}

function render(items, digestCount) {
  if (items.length === 0) {
    showError('No scored items found in the last 7 days.');
    return;
  }

  const dates = items.map(i => new Date(i.published)).filter(d => !isNaN(d));
  const minDate = new Date(Math.min(...dates)).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const maxDate = new Date(Math.max(...dates)).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  const feeds = [...new Set(items.map(i => i.feed_name))];
  const highCount = items.filter(i => i.significance >= 75).length;

  const bands = [
    { label: '75–100 High',    color: 'var(--high)',    count: items.filter(i => i.significance >= 75).length },
    { label: '50–74 Notable',  color: 'var(--notable)', count: items.filter(i => i.significance >= 50 && i.significance < 75).length },
    { label: '25–49 Low',      color: 'var(--low)',     count: items.filter(i => i.significance >= 25 && i.significance < 50).length },
    { label: '1–24 Noise',     color: 'var(--noise)',   count: items.filter(i => i.significance > 0 && i.significance < 25).length },
  ];
  const maxBand = Math.max(...bands.map(b => b.count), 1);

  const sorted = [...items].sort((a, b) => b.significance - a.significance);

  loading.style.display = 'none';
  errorMsg.style.display = 'none';
  report.style.display = 'block';

  const dateRange = `${esc(minDate)} – ${esc(maxDate)}`;
  report.innerHTML = `
    <div class="digest-title">Weekly Digest: ${dateRange}</div>

    <div class="summary-bar">
      <div class="stat">
        <span class="stat-value">${items.length}</span>
        <span class="stat-label">Scored Items</span>
      </div>
      <div class="stat">
        <span class="stat-value">${feeds.length}</span>
        <span class="stat-label">Unique Feeds</span>
      </div>
      <div class="stat">
        <span class="stat-value">${digestCount}</span>
        <span class="stat-label">Digests Loaded</span>
      </div>
      <div class="stat">
        <span class="stat-value high">${highCount}</span>
        <span class="stat-label">High Significance</span>
      </div>
      <div class="stat">
        <span class="stat-value">${esc(minDate)} – ${esc(maxDate)}</span>
        <span class="stat-label">Last 7 Days</span>
      </div>
    </div>

    <section>
      <h2>Significance Distribution</h2>
      <div class="dist-bars">
        ${bands.map(b => `
          <div class="dist-row">
            <span class="dist-label">${b.label}</span>
            <div class="dist-bar-bg">
              <div class="dist-bar-fill" style="width:${Math.round(b.count / maxBand * 100)}%; background:${b.color};"></div>
            </div>
            <span class="dist-count">${b.count}</span>
          </div>
        `).join('')}
      </div>
    </section>

    <section>
      <h2>All Items by Significance</h2>
      <table>
        <thead>
          <tr>
            <th>Sig</th>
            <th>Title</th>
            <th>Feed</th>
            <th>Source Digest</th>
            <th>Tags</th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map(item => `
            <tr>
              <td><span class="sig-badge sig-${sigClass(item.significance)}">${item.significance}</span></td>
              <td>
                <a class="title-link" href="${safeUrl(item.url)}" target="_blank">${esc(item.title)}</a>
                ${item.summary ? `<div class="summary-text">${esc(item.summary)}</div>` : ''}
              </td>
              <td class="feed-name">${esc(item.feed_name)}</td>
              <td class="feed-name">${esc(item._sourceDigest)}</td>
              <td>
                <div class="tags">
                  ${(item.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </section>
  `;
}

async function init() {
  loading.style.display = 'block';

  const allFilenames = await loadManifest();
  if (!allFilenames) return;

  const windowFilenames = getWindowFilenames(allFilenames);
  if (!windowFilenames.length) {
    showError('No digest files found in the last 7 days.');
    return;
  }

  const fileResults = await Promise.all(
    windowFilenames.map(filename =>
      fetchDigest(filename).then(r => ({ filename, data: r.data }))
    )
  );

  const items = aggregateItems(fileResults);
  render(items, windowFilenames.length);
}

init();
</script>
</body>
</html>
